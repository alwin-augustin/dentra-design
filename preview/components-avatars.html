<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Avatars</title>
<link rel="stylesheet" href="_card.css"/>
<link rel="stylesheet" href="../source_css/base.css"/>
<link rel="stylesheet" href="../source_css/components.css"/>

</head>
<body>
<div class="card-root">
<div class="col">
  <div style="display:flex;gap:14px;align-items:center">
    <div class="avatar avatar-xs" style="background:#1E54B7">VS</div>
    <div class="avatar avatar-sm" style="background:#1E54B7">VS</div>
    <div class="avatar avatar-md" style="background:#1E54B7">VS</div>
    <div class="avatar avatar-lg" style="background:#1E54B7">VS</div>
    <div class="avatar avatar-xl" style="background:#1E54B7">VS</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);text-align:center">
    <div>xs · 24</div><div>sm · 30</div><div>md · 38</div><div>lg · 52</div><div>xl · 64</div>
  </div>
  <div style="font-size:11px;color:var(--fg-muted)">Initials-only, 99% of the time. Color is per-person stable (used for scannability), not semantic. The maroon variant is reserved for the logged-in user.</div>
</div>
</div>
</body>
</html>
