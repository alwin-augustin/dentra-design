<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Charcoal-grey scale</title>
<link rel="stylesheet" href="_card.css"/>
<link rel="stylesheet" href="../source_css/base.css"/>
<link rel="stylesheet" href="../source_css/components.css"/>

</head>
<body>
<div class="card-root">
<div class="grid-6">
  <div class="sw"><div class="sw-chip" style="background:#30343E"></div><div class="sw-name">CG 120</div><div class="sw-hex">#30343E</div></div>
  <div class="sw"><div class="sw-chip" style="background:#373C47"></div><div class="sw-name">CG 100</div><div class="sw-hex">#373C47</div></div>
  <div class="sw"><div class="sw-chip" style="background:#5F636C"></div><div class="sw-name">CG 80</div><div class="sw-hex">#5F636C</div></div>
  <div class="sw"><div class="sw-chip" style="background:#9B9DA3"></div><div class="sw-name">CG 60</div><div class="sw-hex">#9B9DA3</div></div>
  <div class="sw"><div class="sw-chip" style="background:#C3C5C8"></div><div class="sw-name">CG 30</div><div class="sw-hex">#C3C5C8</div></div>
  <div class="sw"><div class="sw-chip" style="background:#EBECED"></div><div class="sw-name">CG 10</div><div class="sw-hex">#EBECED</div></div>
</div>
</div>
</body>
</html>
