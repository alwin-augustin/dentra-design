<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Semantic foreground</title>
<link rel="stylesheet" href="_card.css"/>
<link rel="stylesheet" href="../source_css/base.css"/>
<link rel="stylesheet" href="../source_css/components.css"/>

</head>
<body>
<div class="card-root">
<div class="panel">
  <div style="display:grid;grid-template-columns:1fr 110px;gap:12px;align-items:baseline">
    <div style="font-size:18px;font-weight:600;color:#112337">Primary foreground</div>
    <div class="sw-hex" style="text-align:right">--fg-primary</div>
    <div style="font-size:13px;color:#5F636C">Secondary — labels & secondary copy</div>
    <div class="sw-hex" style="text-align:right">--fg-secondary</div>
    <div style="font-size:13px;color:#9B9DA3">Muted — captions, placeholders, hints</div>
    <div class="sw-hex" style="text-align:right">--fg-muted</div>
    <div style="font-size:13px;color:#FFFFFF;background:#2B555B;padding:6px 10px;border-radius:6px;display:inline-block;width:fit-content">On-primary — text on teal</div>
    <div class="sw-hex" style="text-align:right">--fg-on-primary</div>
  </div>
</div>
</div>
</body>
</html>
