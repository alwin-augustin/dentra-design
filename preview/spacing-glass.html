<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Glassmorphism</title>
<link rel="stylesheet" href="_card.css"/>
<link rel="stylesheet" href="../source_css/base.css"/>
<link rel="stylesheet" href="../source_css/components.css"/>

</head>
<body>
<div class="card-root">
<div style="background:linear-gradient(135deg,#A1CBD1 0%,#4F868E 100%);border-radius:12px;padding:32px;display:flex;gap:16px;align-items:center;justify-content:center">
  <div style="background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);border-radius:12px;box-shadow:0 4px 20px rgba(17,35,55,0.03);padding:20px;width:200px">
    <div style="font-size:11px;color:var(--fg-muted);font-weight:700;letter-spacing:0.3px;text-transform:uppercase">Glass card</div>
    <div style="font-size:18px;font-weight:600;color:var(--fg-dark);margin-top:6px">Frosted</div>
    <div style="font-size:11px;color:var(--fg-muted);margin-top:4px">85% white + blur 12</div>
  </div>
  <div style="background:rgba(244,247,247,0.90);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);border-radius:12px;box-shadow:0 24px 64px rgba(17,35,55,0.12);padding:20px;width:200px">
    <div style="font-size:11px;color:var(--fg-muted);font-weight:700;letter-spacing:0.3px;text-transform:uppercase">Modal surface</div>
    <div style="font-size:18px;font-weight:600;color:var(--fg-dark);margin-top:6px">Frosted dark</div>
    <div style="font-size:11px;color:var(--fg-muted);margin-top:4px">90% page-bg + blur 12</div>
  </div>
</div>
<div style="font-size:11px;color:var(--fg-muted);margin-top:8px">Frosted glass sits over the page bg, never over imagery. Used on cards, inputs, modals — and nowhere else.</div>
</div>
</body>
</html>
