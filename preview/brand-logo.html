<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Logo / wordmark</title>
<link rel="stylesheet" href="_card.css"/>
<link rel="stylesheet" href="../source_css/base.css"/>
<link rel="stylesheet" href="../source_css/components.css"/>

</head>
<body>
<div class="card-root">
<div class="col">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="background:var(--bg-surface);border:1px solid var(--color-divider);border-radius:12px;padding:22px 18px">
      <div style="font-size:24px;font-weight:700;letter-spacing:-0.5px;line-height:1"><span style="color:#622244">Den</span><span style="color:#2B555B">tium</span></div>
      <div style="font-size:9px;font-family:var(--font-secondary);color:var(--fg-muted);letter-spacing:1.5px;margin-top:3px;text-transform:uppercase;font-weight:700">DENTAL MANAGEMENT</div>
    </div>
    <div style="background:#1F3E43;border-radius:12px;padding:22px 18px">
      <div style="font-size:24px;font-weight:700;letter-spacing:-0.5px;line-height:1;color:#FFFFFF">Dentium</div>
      <div style="font-size:9px;color:rgba(255,255,255,0.7);letter-spacing:1.5px;margin-top:3px;text-transform:uppercase;font-weight:700">DENTAL MANAGEMENT</div>
    </div>
  </div>
  <div style="display:flex;gap:14px;align-items:center">
    <div style="font-size:14px;font-weight:700;letter-spacing:-0.3px"><span style="color:#622244">Den</span><span style="color:#2B555B">tium</span></div>
    <div style="font-size:18px;font-weight:700;letter-spacing:-0.4px"><span style="color:#622244">Den</span><span style="color:#2B555B">tium</span></div>
    <div style="font-size:24px;font-weight:700;letter-spacing:-0.5px"><span style="color:#622244">Den</span><span style="color:#2B555B">tium</span></div>
    <div style="font-size:32px;font-weight:700;letter-spacing:-0.6px"><span style="color:#622244">Den</span><span style="color:#2B555B">tium</span></div>
  </div>
  <div style="font-size:11px;color:var(--fg-muted)">"Den" is brand maroon, "tium" is brand teal. -0.3px letter-spacing at 18px+. The eyebrow "DENTAL MANAGEMENT" sits 3px below at 9px · 700 · uppercase · 1.5px-letter-spacing.</div>
</div>
</div>
</body>
</html>
