<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Tabs</title>
<link rel="stylesheet" href="_card.css"/>
<link rel="stylesheet" href="../source_css/base.css"/>

</head>
<body>
<div class="card-root">
<div class="panel" style="padding:0">
  <div class="tab-bar" style="padding:0 18px">
    <button class="tab-btn active">Visit Timeline <span class="tab-count">4</span></button>
    <button class="tab-btn">Prescriptions <span class="tab-count">2</span></button>
    <button class="tab-btn">Invoices <span class="tab-count">2</span></button>
    <button class="tab-btn">Files <span class="tab-count">1</span></button>
  </div>
  <div style="padding:18px;font-size:12px;color:var(--fg-muted)">Active tab is 13px · 500 · primary teal, with a 2px primary underline overlaid on the divider.</div>
</div>
</div>
</body>
</html>
