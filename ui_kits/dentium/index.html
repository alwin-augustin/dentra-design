<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Dentium UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="stylesheet" href="styles/tokens.css"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/animations.css"/>
<link rel="stylesheet" href="styles/components.css"/>

<style>
  /* Local kit-only tweaks */
  html, body { overflow-x: hidden; }
  .toast-container { pointer-events: none; }
  /* Force CG-80 secondary text on KPI sub when not danger so the trend arrow reads clearly */
  .kpi-sub { color: var(--fg-muted); }
  /* React's mount-time double render under StrictMode-ish conditions can leave animated
     elements at opacity 0 since the source CSS uses `animation` without fill-mode. Pin
     these to forwards so the end-state always applies. */
  .alert-banner, .doc-chair-card, .kpi-card { animation-fill-mode: forwards !important; }
  /* For static screenshots: skip entrance animations (so html-to-image captures the end state).
     Real users still see the animations because page-level animation runs at mount. */
  .alert-banner { animation: none !important; }
</style>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="data.js"></script>
</head>
